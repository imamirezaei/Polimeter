name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build analytics dashboard
        run: python3 local-dashboard/app.py --build-only

      - name: Prepare static artifact
        run: |
          rm -rf site
          mkdir -p site
          cp index.html style.css app.js LICENSE README.md site/
          [ -f og-image.svg ] && cp og-image.svg site/
          [ -d storage ] && cp -R storage site/
          [ -d data ] && cp -R data site/
          if [ -f local-dashboard/index.html ]; then
            mkdir -p site/local-dashboard
            cp local-dashboard/index.html local-dashboard/style.css local-dashboard/dashboard.js site/local-dashboard/
          fi
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
